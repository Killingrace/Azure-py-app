version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: liga_user
      POSTGRES_PASSWORD: liga_password
      POSTGRES_DB: liga_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg_async://liga_user:liga_password@db:5432/liga_db
      SECRET_KEY: supersecretkey_from_docker_compose
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

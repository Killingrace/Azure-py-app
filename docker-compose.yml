version: '3.8'


services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liga_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liga_password}
      POSTGRES_DB: ${POSTGRES_DB:-liga_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-seed:
    build: ./backend
    command: python seed.py
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg_async://liga_user:liga_password@db:5432/liga_db}
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg_async://liga_user:liga_password@db:5432/liga_db}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_from_docker_compose}
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    ports:
      - "81:80"
    environment:
      VITE_API_URL: /api
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
